<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">The Bungalow Burnley exterior with illustrated overlay</title>
  <desc id="desc">A layered composition using the bungalow photograph and the hand-drawn Bungalow Burnley artwork.</desc>
  <defs>
    <linearGradient id="shade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07120e" stop-opacity=".88"/>
      <stop offset=".5" stop-color="#173425" stop-opacity=".38"/>
      <stop offset="1" stop-color="#d74e67" stop-opacity=".16"/>
    </linearGradient>
    <radialGradient id="light" cx=".68" cy=".16" r=".62">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".58"/>
      <stop offset=".46" stop-color="#ffffff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <clipPath id="markClip">
      <path d="M109 742 C250 682 344 576 451 461 C632 267 866 236 1095 303 C1282 358 1376 483 1519 587 C1605 650 1706 695 1780 785 L1780 1160 L112 1160 Z"/>
    </clipPath>
  </defs>
  <image href="bungalow-exterior.jpg" width="1800" height="1200" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1800" height="1200" fill="url(#shade)"/>
  <rect width="1800" height="1200" fill="url(#light)"/>
  <g clip-path="url(#markClip)" opacity=".9">
    <image href="bungalow-logo.jpg" x="425" y="258" width="950" height="580" preserveAspectRatio="xMidYMid meet" opacity=".78"/>
  </g>
  <path d="M98 743 C245 676 351 553 474 431 C625 282 844 223 1089 292 C1286 347 1390 478 1531 583 C1618 648 1708 690 1784 779" fill="none" stroke="#fff7ef" stroke-width="3" stroke-opacity=".58"/>
  <path d="M118 791 C279 741 426 661 556 559 C733 421 906 393 1092 433 C1256 468 1399 558 1541 674 C1625 742 1706 786 1778 812" fill="none" stroke="#d74e67" stroke-width="5" stroke-opacity=".48"/>
  <rect width="1800" height="1200" filter="url(#paper)"/>
</svg>
